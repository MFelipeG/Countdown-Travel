<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Voyage — Countdown</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0e0e0e">

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Space+Mono:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&family=Bebas+Neue&family=DM+Serif+Display:ital@0;1&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        /* BASE & RESET */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #0e0e0e; color: #fff; font-family: 'Space Mono', monospace; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 16px 16px 60px; overflow-x: hidden; }

        /* TOPBAR & TABS */
        .topbar { width: 100%; max-width: 430px; display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
        .trip-tabs { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
        .trip-tabs::-webkit-scrollbar { display: none; }
        .trip-tab { background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.1); color: rgba(255,255,255,.4); font-size: 10px; padding: 8px 16px; border-radius: 30px; cursor: pointer; white-space: nowrap; transition: 0.3s; }
        .trip-tab.active { background: rgba(255,255,255,.15); border-color: rgba(255,255,255,.4); color: #fff; }
        .trip-tab-add { background: none; border: 1px dashed rgba(255,255,255,.2); color: rgba(255,255,255,.4); padding: 6px 14px; border-radius: 30px; cursor: pointer; }

        .switcher { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; background: rgba(255,255,255,.03); padding: 4px; border-radius: 12px; }
        .sw-btn { background: none; border: none; color: rgba(255,255,255,.3); font-size: 9px; padding: 8px; border-radius: 8px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
        .sw-btn.active { background: rgba(255,255,255,.08); color: #fff; }

        /* WIDGET WRAPPERS */
        .widget-wrap { width: 100%; max-width: 420px; display: none; animation: fadeIn 0.5s ease; }
        .widget-wrap.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- LAYOUT 1: BOARDING PASS --- */
        .l1-ticket { background: #faf7f2; border-radius: 20px 20px 0 0; padding: 25px; color: #0d0d0d; position: relative; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .l1-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .l1-brand { font-family: 'Cormorant Garamond', serif; font-size: 11px; letter-spacing: 3px; color: #b8a98a; text-transform: uppercase; }
        .l1-badge { font-size: 8px; border: 1px solid #c9a84c; color: #c9a84c; padding: 3px 8px; border-radius: 4px; }
        
        .l1-route { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .l1-apt-code { font-family: 'Playfair Display', serif; font-size: 48px; font-weight: 700; line-height: 1; }
        .l1-apt-city { font-size: 9px; color: #b8a98a; text-transform: uppercase; letter-spacing: 1px; }
        .l1-mid { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 0 15px; opacity: 0.4; }
        .l1-dash { width: 100%; height: 1px; background: repeating-linear-gradient(90deg, #c9a84c 0, 4px, transparent 4px, 8px); }
        
        .l1-passengers { margin-bottom: 20px; border-top: 1px solid rgba(184,169,138,0.2); padding-top: 12px; }
        .l1-pass-lbl { font-size: 7px; text-transform: uppercase; letter-spacing: 2px; color: #b8a98a; margin-bottom: 8px; }
        .l1-pnames-list { display: flex; flex-direction: column; gap: 6px; }
        .l1-prow { display: flex; justify-content: space-between; font-family: 'Cormorant Garamond', serif; font-size: 16px; border-bottom: 1px solid rgba(184,169,138,0.1); padding-bottom: 2px; }
        .l1-prow .p-seat { font-family: 'Space Mono', monospace; font-size: 11px; color: #c9a84c; font-weight: bold; }

        .l1-counts { display: flex; justify-content: center; margin-bottom: 20px; }
        .l1-num { font-family: 'Playfair Display', serif; font-size: 60px; font-weight: 700; line-height: 1; }
        .l1-unit { font-size: 12px; color: #b8a98a; margin-left: 5px; }

        .l1-details { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding-top: 15px; border-top: 1px dashed rgba(184,169,138,0.3); }
        .l1-det-lbl { font-size: 7px; text-transform: uppercase; color: #b8a98a; letter-spacing: 1px; }
        .l1-det-val { font-size: 11px; font-weight: bold; margin-top: 3px; }

        .l1-tear { display: flex; align-items: center; margin: -1px 0; }
        .l1-tc { width: 24px; height: 24px; background: #0e0e0e; border-radius: 50%; }
        .l1-tl { flex: 1; height: 2px; background: repeating-linear-gradient(90deg, #faf7f2 0, 8px, transparent 8px, 14px); opacity: 0.5; }

        .l1-stub { background: #1a1a1a; color: #fff; border-radius: 0 0 20px 20px; padding: 20px 25px; }
        .l1-srow { display: flex; justify-content: space-between; align-items: flex-start; }
        .l1-slbl { font-size: 7px; color: rgba(255,255,255,0.3); text-transform: uppercase; margin-bottom: 4px; }
        .l1-sval { font-size: 12px; font-weight: bold; }
        .l1-gval { font-family: 'Playfair Display', serif; font-size: 32px; color: #c9a84c; line-height: 1; }

        /* --- LAYOUT 2: NEON TOKYO --- */
        .l2-card { background: #000; border: 1px solid #333; border-radius: 20px; padding: 30px 20px; position: relative; overflow: hidden; }
        .l2-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: linear-gradient(90deg, #00f2ff, #7000ff); }
        .l2-city { font-family: 'Bebas Neue', sans-serif; font-size: 50px; line-height: 0.9; letter-spacing: 2px; background: linear-gradient(#fff, #666); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .l2-days { font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 80px; color: #fff; line-height: 1; margin: 20px 0; }
        .l2-label { font-size: 10px; color: #00f2ff; text-transform: uppercase; letter-spacing: 4px; }

        /* --- LAYOUT 3: GOLDEN HOUR --- */
        .l3-card { background: linear-gradient(135deg, #1a1610 0%, #0a0a0a 100%); border-radius: 20px; padding: 40px 20px; text-align: center; border: 1px solid #2a2419; }
        .l3-title { font-family: 'Playfair Display', serif; font-style: italic; font-size: 18px; color: #c9a84c; margin-bottom: 30px; }
        .l3-big { font-family: 'DM Serif Display', serif; font-size: 90px; color: #f2e6d0; line-height: 1; }
        .l3-sub { font-size: 10px; letter-spacing: 5px; color: rgba(201,168,76,0.5); text-transform: uppercase; margin-top: 10px; }

        /* MODAL */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(8px); z-index: 9999; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-overlay.open { display: flex; }
        .modal { background: #f7f3ec; color: #0d0d0d; border-radius: 24px; padding: 25px; width: 100%; max-width: 400px; max-height: 90vh; overflow-y: auto; }
        .modal-title { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: bold; margin-bottom: 20px; border-bottom: 1px solid #ddd; padding-bottom: 10px; }
        .field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 15px; }
        .field label { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: #888; }
        .field input, .field textarea { border: 1px solid #ccc; padding: 10px; border-radius: 8px; font-family: inherit; font-size: 14px; }
        .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .save-btn { width: 100%; background: #0d0d0d; color: #c9a84c; border: none; padding: 15px; border-radius: 12px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .delete-btn { width: 100%; background: none; border: 1px solid rgba(255,0,0,0.2); color: #c66; padding: 10px; border-radius: 12px; margin-top: 10px; font-size: 11px; cursor: pointer; }

        .edit-float { width: 100%; background: none; border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.3); padding: 10px; border-radius: 10px; margin-top: 15px; font-size: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div class="topbar">
    <div class="trip-tabs" id="tripTabs"></div>
    <div class="switcher">
        <button class="sw-btn active" id="sw1">Boarding</button>
        <button class="sw-btn" id="sw2">Neon</button>
        <button class="sw-btn" id="sw3">Golden</button>
    </div>
</div>

<div class="widget-wrap active" id="layout1">
    <div class="l1-ticket">
        <div class="l1-header">
            <div class="l1-brand">Voyage &middot; Air</div>
            <div class="l1-badge" id="l1-badge-class">FIRST CLASS</div>
        </div>
        <div class="l1-route">
            <div>
                <div class="l1-apt-code" id="l1-origin">GRU</div>
                <div class="l1-apt-city" id="l1-ocity">S. Paulo</div>
            </div>
            <div class="l1-mid"><div class="l1-dash"></div>✈</div>
            <div style="text-align:right">
                <div class="l1-apt-code" id="l1-dest">CDG</div>
                <div class="l1-apt-city" id="l1-dcity">Paris</div>
            </div>
        </div>
        <div class="l1-passengers">
            <div class="l1-pass-lbl">Passageiros / Assentos</div>
            <div class="l1-pnames-list" id="l1-pnames-list"></div>
        </div>
        <div class="l1-counts">
            <div><span class="l1-num" id="l1-days-go">00</span><span class="l1-unit">dias para embarque</span></div>
        </div>
        <div class="l1-details">
            <div><div class="l1-det-lbl">Voo</div><div class="l1-det-val" id="l1-flight">--</div></div>
            <div style="text-align:center"><div class="l1-det-lbl">Portão</div><div class="l1-det-val" id="l1-gate-det">--</div></div>
            <div style="text-align:right"><div class="l1-det-lbl">Assento</div><div class="l1-det-val" id="l1-seat-main">--</div></div>
        </div>
    </div>
    <div class="l1-tear"><div class="l1-tc"></div><div class="l1-tl"></div><div class="l1-tc"></div></div>
    <div class="l1-stub">
        <div class="l1-srow">
            <div>
                <div class="l1-slbl">Data de Ida</div><div class="l1-sval" id="l1-date-go">--/--/--</div>
                <div class="l1-slbl" style="margin-top:10px">Data de Volta</div><div class="l1-sval" id="l1-date-ret" style="color:#c9a84c">--/--/--</div>
            </div>
            <div style="text-align:right">
                <div class="l1-slbl">Status</div><div class="l1-gval">ON TIME</div>
            </div>
        </div>
        <button class="edit-float" onclick="openModal(true)">✦ EDITAR VIAGEM</button>
    </div>
</div>

<div class="widget-wrap" id="layout2">
    <div class="l2-card">
        <div class="l2-city" id="l2-dest-city">TOKYO</div>
        <div class="l2-days" id="l2-days-go">00</div>
        <div class="l2-label">Days to Departure</div>
        <button class="edit-float" onclick="openModal(true)">EDIT TRIP</button>
    </div>
</div>

<div class="widget-wrap" id="layout3">
    <div class="l3-card">
        <div class="l3-title" id="l3-trip-name">Paris Expedition</div>
        <div class="l3-big" id="l3-days-go">00</div>
        <div class="l3-sub">Days Remaining</div>
        <button class="edit-float" onclick="openModal(true)">MANAGE</button>
    </div>
</div>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <div class="modal-title">Configurar Viagem</div>
        <div class="field"><label>Nome da Viagem / Destino</label><input type="text" id="inp-tripname"></div>
        <div class="field-row">
            <div class="field"><label>Origem (Cod)</label><input type="text" id="inp-ocode" maxlength="4"></div>
            <div class="field"><label>Destino (Cod)</label><input type="text" id="inp-dcode" maxlength="4"></div>
        </div>
        <div class="field-row">
            <div class="field"><label>Voo</label><input type="text" id="inp-flight"></div>
            <div class="field"><label>Classe</label><input type="text" id="inp-class"></div>
        </div>
        <div class="field-row">
            <div class="field"><label>Portão</label><input type="text" id="inp-gate"></div>
            <div class="field"><label>Assento Geral</label><input type="text" id="inp-seat"></div>
        </div>
        <div class="field-row">
            <div class="field"><label>Data de Ida</label><input type="date" id="inp-date-go"></div>
            <div class="field"><label>Data de Volta</label><input type="date" id="inp-date-ret"></div>
        </div>
        <div class="field">
            <label>Passageiros (Nome - Assento)</label>
            <textarea id="inp-passengers" rows="3" placeholder="Marlon - 6F&#10;Julia - 6E"></textarea>
        </div>
        <button class="save-btn" id="saveBtn">SALVAR ALTERAÇÕES</button>
        <button class="delete-btn" id="deleteBtn">APAGAR VIAGEM</button>
        <button onclick="document.getElementById('modalOverlay').classList.remove('open')" style="width:100%; background:none; border:none; margin-top:15px; font-size:11px; color:#999; cursor:pointer">Cancelar</button>
    </div>
</div>

<script src="voyage.js"></script>
</body>
</html>
