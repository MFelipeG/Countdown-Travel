<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Voyage — Countdown</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Space+Mono:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&family=Bebas+Neue&family=DM+Serif+Display:ital@0;1&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
/* Estilos Base mantidos e melhorados */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{background:#0e0e0e;min-height:100vh;display:flex;flex-direction:column;align-items:center;font-family:'Space Mono',monospace;padding:16px 16px 50px}

.topbar{width:100%;max-width:430px;display:flex;flex-direction:column;gap:10px;margin-bottom:18px}
.trip-tabs{display:flex;gap:6px;flex-wrap:wrap}
.trip-tab{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.4);font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.14em;padding:6px 12px;border-radius:30px;cursor:pointer;transition:all .2s;white-space:nowrap}
.trip-tab.active{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.3);color:#fff}
.trip-tab-add{background:none;border:1px dashed rgba(255,255,255,.15);color:rgba(255,255,255,.3);font-size:16px;padding:2px 12px;border-radius:30px;cursor:pointer}

.widget-wrap{width:100%;max-width:420px;display:none;animation:fadeUp .4s ease forwards}
.widget-wrap.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

/* LAYOUT 1 - BOARDING PASS */
.l1-ticket{background:#faf7f2;border-radius:18px 18px 0 0;padding:24px 22px 18px;position:relative;overflow:hidden;box-shadow:0 28px 56px rgba(0,0,0,.6)}
.l1-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px}
.l1-brand{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:10px;letter-spacing:.4em;color:#b8a98a;text-transform:uppercase}
.l1-badge{font-size:8px;letter-spacing:.16em;color:#c9a84c;border:1px solid rgba(201,168,76,.55);padding:3px 8px;text-transform:uppercase}
.l1-route{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.l1-apt-code{font-family:'Playfair Display',serif;font-size:44px;font-weight:700;color:#0d0d0d;line-height:1}
.l1-apt-city{font-size:8px;letter-spacing:.16em;color:#b8a98a;text-transform:uppercase}
.l1-mid{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;padding:0 6px}
.l1-plane{font-size:16px}
.l1-dash{width:100%;height:1px;background:repeating-linear-gradient(90deg,#c9a84c 0,#c9a84c 4px,transparent 4px,transparent 8px);opacity:.35}

/* NOVO: LISTA DE PASSAGEIROS COM ASSENTOS LATERAIS */
.l1-passengers{margin-bottom:16px}
.l1-pass-lbl{font-size:7px;letter-spacing:.28em;color:#b8a98a;text-transform:uppercase;margin-bottom:6px;border-bottom: 1px solid rgba(184,169,138,0.2);padding-bottom:2px}
.l1-pnames-list { display: flex; flex-direction: column; gap: 4px; }
.l1-prow { display: flex; justify-content: space-between; align-items: baseline; font-family: 'Cormorant Garamond', serif; font-size: 14px; color: #0d0d0d; }
.l1-prow .p-seat { font-family: 'Space Mono', monospace; font-size: 10px; color: #c9a84c; font-weight: bold; }

.l1-counts{display:flex;border-top:1px dashed rgba(184,169,138,.28);border-bottom:1px dashed rgba(184,169,138,.28);margin-bottom:16px}
.l1-count-block{flex:1;text-align:center;padding:12px 6px}
.l1-num{font-family:'Playfair Display',serif;font-size:52px;font-weight:700;color:#0d0d0d;line-height:1}
.l1-unit{font-size:12px;color:#b8a98a;margin-left:4px}
.l1-details{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px}
.l1-det-lbl{font-size:7px;letter-spacing:.22em;color:#b8a98a;text-transform:uppercase}
.l1-det-val{font-size:11px;color:#0d0d0d;margin-top:2px;font-weight: bold}

.l1-tear{display:flex;align-items:center}
.l1-tc{width:20px;height:20px;border-radius:50%;background:#0e0e0e;flex-shrink:0}
.l1-tl{flex:1;height:2px;background:repeating-linear-gradient(90deg,rgba(255,255,255,.08) 0,7px,transparent 7px,13px);margin:0 -2px}
.l1-stub{background:#0d0d0d;border-radius:0 0 18px 18px;padding:14px 22px 18px;position:relative}
.l1-stub-row{display:flex;justify-content:space-between;align-items:flex-start}
.l1-sval-gold{font-family:'Cormorant Garamond',serif;font-size:13px;color:#c9a84c}
.l1-gval{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:#c9a84c}
.edit-btn{width:100%;margin-top:12px;background:none;border:1px solid rgba(201,168,76,.16);border-radius:6px;color:rgba(184,169,138,.42);padding:8px;font-size:9px;cursor:pointer}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.92);backdrop-filter:blur(10px);z-index:9999;display:none;align-items:center;justify-content:center;padding:15px}
.modal-overlay.open{display:flex}
.modal{background:#f7f3ec;border-radius:18px;padding:25px;width:100%;max-width:380px;border-top:3px solid #c9a84c;max-height:90vh;overflow-y:auto}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-style:italic;margin-bottom:15px}
.field{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.field label{font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:#b8a98a}
.field input, .field textarea{background:rgba(184,169,138,.1);border:1px solid rgba(184,169,138,.2);border-radius:6px;padding:8px 12px;font-family:'Space Mono',monospace;font-size:12px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.save-btn{width:100%;padding:12px;background:#0d0d0d;color:#c9a84c;border:none;border-radius:8px;cursor:pointer;font-size:10px;letter-spacing:.2em;text-transform:uppercase}
.delete-btn{margin-top:8px;width:100%;background:none;border:none;color:rgba(255,0,0,0.3);font-size:9px;cursor:pointer}
</style>
</head>
<body>

<div class="topbar">
  <div class="trip-tabs" id="tripTabs"></div>
</div>

<div class="widget-wrap active" id="layout1">
  <div class="l1-ticket">
    <div class="l1-header">
      <div class="l1-brand">Voyage &middot; Countdown</div>
      <div class="l1-badge" id="l1-badge-class">FIRST CLASS</div>
    </div>
    <div class="l1-route">
      <div>
        <div class="l1-apt-code" id="l1-origin">GRU</div>
        <div class="l1-apt-city" id="l1-ocity">São Paulo</div>
      </div>
      <div class="l1-mid">
        <div class="l1-plane">✈</div>
        <div class="l1-dash"></div>
      </div>
      <div class="l1-apt-r" style="text-align:right">
        <div class="l1-apt-code" id="l1-dest">CDG</div>
        <div class="l1-apt-city" id="l1-dcity">Paris</div>
      </div>
    </div>

    <div class="l1-passengers">
      <div class="l1-pass-lbl">passageiros / assentos</div>
      <div class="l1-pnames-list" id="l1-pnames-list">
        </div>
    </div>

    <div class="l1-counts">
      <div class="l1-count-block">
        <div class="l1-num" id="l1-days-go">00</div><span class="l1-unit">dias</span>
      </div>
    </div>

    <div class="l1-details">
      <div><div class="l1-det-lbl">Voo</div><div class="l1-det-val" id="l1-flight">--</div></div>
      <div style="text-align:center"><div class="l1-det-lbl">Classe</div><div class="l1-det-val" id="l1-class-det">--</div></div>
      <div style="text-align:right"><div class="l1-det-lbl">Assento</div><div class="l1-det-val" id="l1-seat-main">--</div></div>
    </div>
  </div>

  <div class="l1-tear"><div class="l1-tc"></div><div class="l1-tl"></div><div class="l1-tc"></div></div>

  <div class="l1-stub">
    <div class="l1-stub-row">
      <div>
        <div class="l1-slbl">Partida</div><div class="l1-sval" id="l1-date-go-txt">--</div>
        <div class="l1-slbl" style="margin-top:8px">Destino</div><div class="l1-sval-gold" id="l1-dest-full">--</div>
      </div>
      <div style="text-align:right">
        <div class="l1-slbl">Portão</div><div class="l1-gval" id="l1-gate">--</div>
      </div>
    </div>
    <button class="edit-btn" id="editBtn">✦ EDITAR VIAGEM</button>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title">Configurar Viagem</div>
    
    <div class="field"><label>Nome da Viagem</label><input type="text" id="inp-tripname"></div>
    
    <div class="field-row">
      <div class="field"><label>Origem (Cod)</label><input type="text" id="inp-ocode" maxlength="4"></div>
      <div class="field"><label>Destino (Cod)</label><input type="text" id="inp-dcode" maxlength="4"></div>
    </div>

    <div class="field-row">
      <div class="field"><label>Voo</label><input type="text" id="inp-flight"></div>
      <div class="field"><label>Classe</label><input type="text" id="inp-class"></div>
    </div>

    <div class="field-row">
      <div class="field"><label>Portão</label><input type="text" id="inp-gate"></div>
      <div class="field"><label>Assento Principal</label><input type="text" id="inp-seat"></div>
    </div>

    <div class="field"><label>Data de Ida</label><input type="date" id="inp-date-go"></div>

    <div class="field">
      <label>Passageiros (Nome - Assento)</label>
      <textarea id="inp-passengers" rows="4" placeholder="João Silva - 12A&#10;Maria Souza - 12B"></textarea>
    </div>

    <button class="save-btn" id="saveBtn">SALVAR DADOS</button>
    <button class="delete-btn" id="deleteBtn">Apagar Viagem</button>
    <button class="delete-btn" id="closeModal" style="color:#b8a98a">Cancelar</button>
  </div>
</div>

<script src="voyage.js"></script>
</body>
</html>
